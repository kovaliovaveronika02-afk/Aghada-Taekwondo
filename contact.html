<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Aghada Taekwondo</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
        }
        header {
            background-color: black;
            padding: 10px 0;
        }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 0;
        }
        nav li {
            margin: 0 20px;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        nav a:hover {
            color: purple;
        }
        .nav-logo {
            max-width: 100px;
            height: auto;
            display: block;
            margin: 0 auto 10px;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 40px;
        }
        .contact-info {
            text-align: center;
            margin-bottom: 40px;
        }
        .contact-info p {
            font-size: 1.2rem;
            margin: 10px 0;
        }
        .social-button {
            display: inline-block;
            background-color: purple;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 40px;
        }
        .social-button:hover {
            background-color: #800080;
        }
        form {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 8px;
        }
        form h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            background-color: purple;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #800080;
        }
        footer {
            background-color: #4B2354;
            color: white;
            padding: 20px 0;
            text-align: center;
        }
        .footer-content {
            max-width: 800px;
            margin: 0 auto;
        }
        .footer-logo {
            max-width: 100px;
            height: auto;
            margin-bottom: 10px;
        }
        .footer-links a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-size: 1.1rem;
        }
        .footer-links a:hover {
            color: #ddd;
        }
        footer p {
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About the Coach</a></li>
                <li><a href="events.html">Events</a></li>
                <li><a href="timetable.html">Timetable</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1>Contact Us</h1>
        <div class="contact-info">
            <p><strong>Phone:</strong> 089 422 3993</p>
            <p><strong>Email:</strong> ita.aghada@gmail.com</p>
        </div>
        <a href="https://www.instagram.com/aghada_taekwondo/" class="social-button" target="_blank">Follow us on Instagram</a>
        <form action="#" method="post">
            <h2>Send a Message</h2>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>
    <footer>
        <div class="footer-content">
            <img src="logo.jpg" alt="Aghada Taekwondo Logo" class="footer-logo">
            <div class="footer-links">
                <a href="https://www.instagram.com/aghada_taekwondo/" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
                <a href="https://www.facebook.com/profile.php?id=100093983679748" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
                <a href="mailto:ita.aghada@gmail.com"><i class="fas fa-envelope"></i> Email</a>
            </div>
            <p>&copy; 2024 Aghada Taekwondo. All Rights Reserved.</p>
        </div>
    </footer>
</body>
</html>
